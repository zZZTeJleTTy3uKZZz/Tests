name: knowledge-base

services:
  knowledge-base-api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: knowledge-base-api
    ports:
      - "8000:8000"
    volumes:
      - ./knowledge_base.db:/app/knowledge_base.db
      - ./app:/app/app
      - ./main.py:/app/main.py
      - ../../docs_parsing:/app/docs
      - ./.notebooklm:/app/.notebooklm
    environment:
      - ENVIRONMENT=development
      - NOTEBOOKLM_HOME=/app/.notebooklm
    restart: unless-stopped
    command: sh -c "uv run alembic upgrade head && uv run uvicorn main:app --host 0.0.0.0 --port 8000 --reload"
